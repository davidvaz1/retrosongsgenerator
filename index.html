<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Final Paint Fix</title>
    <style>
        :root { --accent: #1DB954; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); }
        body { background: #05070a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        
        /* Floating Background */
        .orb { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.4; animation: drift 30s infinite alternate; }
        @keyframes drift { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .header {
            max-width: 600px; margin: 20px auto; text-align: center;
            background: var(--glass); backdrop-filter: blur(30px);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border);
            position: sticky; top: 10px; z-index: 100;
        }

        .auth-grid { display: grid; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.6); color: white; }
        
        /* GRID FIX: Solid Display */
        #grid { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1400px; margin: 40px auto;
            min-height: 500px; /* Forces space to exist */
        }

        .card { 
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; display: flex; flex-direction: column; height: 100%;
        }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #111; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; height: 2.8em; overflow: hidden; }
        .artist { color: var(--accent); font-weight: 700; margin-bottom: 15px; }
        .stats { font-size: 0.8rem; color: #aaa; margin-bottom: 20px; flex-grow: 1; }
        .stats div { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; }
        
        .play-link { 
            background: var(--accent); color: white; text-decoration: none; text-align: center; 
            padding: 12px; border-radius: 10px; font-weight: 800; font-size: 0.9rem;
        }

        #status { color: var(--accent); font-weight: 900; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="orb" style="background: #1DB954; top: -100px; left: -100px;"></div>
    <div class="orb" style="background: #7928ca; bottom: -100px; right: -100px; animation-delay: -10s;"></div>

    <div class="header">
        <h1 style="margin:0">Global 100 Explorer</h1>
        <div class="auth-grid">
            <input type="text" id="clientId" placeholder="Client ID">
            <input type="password" id="clientSecret" placeholder="Client Secret">
        </div>
        <button onclick="run()" style="background:var(--accent); color:white; border:none; padding:15px 40px; border-radius:30px; cursor:pointer; font-weight:900; width:100%">GENERATE 100 SONGS</button>
        <div id="status">Ready</div>
    </div>

    <div id="grid"></div>

    <script>
        async function run() {
            const id = document.getElementById('clientId').value.trim();
            const secret = document.getElementById('clientSecret').value.trim();
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if(!id || !secret) return alert("Keys required!");
            
            grid.innerHTML = ""; 
            status.innerText = "Connecting...";

            try {
                // 1. Get Token
                const auth = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + btoa(id + ':' + secret), 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await auth.json();

                // 2. Multi-batch fetch with randomness
                const seed = "abcdefghijklmnopqrstuvwxyz"[Math.floor(Math.random()*26)];
                
                for (let i = 0; i < 5; i++) {
                    status.innerText = `Fetching: ${ (i+1)*20 } / 100`;
                    
                    const res = await fetch(`https://api.spotify.com/v1/search?q=${seed}*&type=track&limit=20&offset=${i*20}&market=US`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    
                    const data = await res.json();
                    if(data.tracks?.items) {
                        data.tracks.items.forEach(track => {
                            // Direct Injection into DOM (No waiting for variables)
                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <img src="${track.album.images[0]?.url || ''}">
                                <div class="card-content">
                                    <div class="title">${track.name}</div>
                                    <div class="artist">${track.artists[0].name}</div>
                                    <div class="stats">
                                        <div><span>Album</span><span>${track.album.name.slice(0,12)}..</span></div>
                                        <div><span>Release</span><span>${track.album.release_date.split('-')[0]}</span></div>
                                        <div><span>Popularity</span><span>${track.popularity}%</span></div>
                                    </div>
                                    <a href="${track.external_urls.spotify}" target="_blank" class="play-link">SPOTIFY LINK</a>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                }
                status.innerText = "✨ 100 Songs Displayed Successfully";
            } catch (e) {
                status.innerText = "System Error: " + e.message;
            }
        }
    </script>
</body>
</html>
