<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 100 - Live Spotify</title>
    <style>
        :root {
            --accent: #1DB954;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --bg-color: #0b0e14;
        }
        /* [KEEP ALL YOUR EXISTING CSS - just replace HTML/JS] */
        body {background: var(--bg-color);color: white;font-family: 'Inter', system-ui, -apple-system, sans-serif;margin: 0;padding: 20px;min-height: 100vh;overflow-x: hidden}
        .orb {position: fixed;width: 500px;height: 500px;border-radius: 50%;filter: blur(80px);z-index: -1;opacity: .4;animation: float 20s infinite alternate ease-in-out}
        .orb-1 {background: #1DB954;top: -10%;left: -10%}
        .orb-2 {background: #7928ca;bottom: -10%;right: -10%;animation-delay: -5s}
        @keyframes float {0% {transform: translate(0, 0)}100% {transform: translate(100px, 50px)}}
        .header {max-width: 550px;margin: 60px auto;text-align: center;background: var(--glass);backdrop-filter: blur(25px);-webkit-backdrop-filter: blur(25px);padding: 40px;border-radius: 32px;border: 1px solid var(--glass-border);box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5)}
        h1 {font-size: 2.5rem;letter-spacing: -1.5px;margin-bottom: 25px}
        button {width: 100%;padding: 16px;background: var(--accent);color: #000;border: none;border-radius: 50px;cursor: pointer;font-weight: 800;font-size: 1rem;text-transform: uppercase;letter-spacing: 1px;transition: transform 0.2s, background 0.3s}
        button:hover {transform: scale(1.02);background: #1ed760}
        button:active {transform: scale(0.98)}
        #status {margin-top: 20px;font-weight: 700;font-size: .9rem;color: var(--accent);letter-spacing: .5px}
        #grid {display: grid;grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));gap: 30px;margin: 50px auto 0;max-width: 1400px;padding: 0 20px}
        .card {background: var(--glass);backdrop-filter: blur(15px);-webkit-backdrop-filter: blur(15px);border-radius: 24px;padding: 20px;border: 1px solid var(--glass-border);transition: .4s cubic-bezier(.175, .885, .32, 1.275);display: flex;flex-direction: column}
        .card:hover {transform: translateY(-12px);border-color: rgba(255, 255, 255, 0.3);background: rgba(255, 255, 255, 0.1)}
        .card img {width: 100%;height: 300px;object-fit: cover;border-radius: 16px;margin-bottom: 18px;box-shadow: 0 10px 20px rgba(0,0,0,0.3)}
        .card-info {flex-grow: 1}
        .card strong {font-size: 1.1rem;display: block;margin-bottom: 4px;line-height: 1.3}
        .card small {font-size: .9rem;color: #b3b3b3;font-weight: 500}
        .btn {display: block;background: rgba(255, 255, 255, 0.1);color: white;text-align: center;padding: 12px;border-radius: 12px;text-decoration: none;font-weight: 700;margin-top: 20px;font-size: .85rem;border: 1px solid var(--glass-border);transition: .3s}
        .btn:hover {background: white;color: black}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="header">
        <h1>Global 100</h1>
        <button onclick="fetchSpotify()">🎵 Fetch Latest Releases</button>
        <p id="status">Loading live Spotify data...</p>
    </div>

    <div id="grid"></div>

<script>
async function fetchSpotify() {
    const status = document.getElementById('status');
    const grid = document.getElementById('grid');
    
    status.textContent = '🔄 Loading Spotify releases...';
    grid.innerHTML = '';

    try {
        const response = await fetch('/api/spotify');
        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        
        const data = await response.json();
        
        if (!data.albums || data.albums.length === 0) {
            throw new Error('No albums received from Spotify');
        }

        data.albums.forEach((album, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const imgUrl = album.images?.[0]?.url || '';
            const artistName = album.artists?.[0]?.name || 'Unknown Artist';
            const albumUrl = album.external_urls?.spotify || '#';
            
            card.innerHTML = `
                <img src="${imgUrl}" alt="${album.name}" loading="lazy" 
                     style="width:100%;height:300px;object-fit:cover;border-radius:16px;margin-bottom:18px;box-shadow:0 10px 20px rgba(0,0,0,0.3);"
                     onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('afterbegin','<div style=\\"display:flex;align-items:center;justify-content:center;height:300px;background:linear-gradient(135deg,#1DB954,#7928ca);border-radius:16px;font-size:4rem\\">🎵</div>')">
                <div class="card-info">
                    <strong>${album.name}</strong>
                    <small>${artistName}</small>
                </div>
                <a href="${albumUrl}" target="_blank" class="btn">🎧 SPOTIFY</a>
            `;
            grid.appendChild(card);
        });

        status.innerHTML = `✅ <strong>${data.albums.length}</strong> New Releases Live!`;
    } catch (error) {
        status.textContent = `❌ ${error.message}`;
        console.error('Load error:', error);
    }
}

// Load immediately + auto-refresh every 10 minutes
fetchSpotify();
setInterval(fetchSpotify, 600000);
</script>

</body>
</html>
