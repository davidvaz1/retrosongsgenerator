<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Glassmorphism Restored</title>
    <style>
        :root { --accent: #1DB954; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); }
        body { 
            background: #090c10; color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* The "Glass" Background Effect */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1db95433 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #7928ca33 0%, transparent 40%);
            z-index: -1;
        }

        .header {
            max-width: 600px; margin: 40px auto; text-align: center;
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-box { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        input { 
            padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.4); color: white; outline: none;
        }

        /* GRID - Forced Layout */
        #grid { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1400px; margin: 0 auto;
            min-height: 200px;
        }

        .card { 
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; display: flex; flex-direction: column;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #111; }
        
        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .song-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; line-height: 1.3; height: 2.6em; overflow: hidden; }
        .artist { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-bottom: 15px; }
        
        .meta { font-size: 0.8rem; color: #aaa; margin-bottom: 20px; flex-grow: 1; }
        .meta-row { display: flex; justify-content: space-between; margin-bottom: 4px; }

        .btn-play { 
            background: var(--accent); color: white; text-decoration: none; 
            text-align: center; padding: 12px; border-radius: 12px; font-weight: 800;
        }

        #status { color: var(--accent); font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="header">
        <h1>Global 100 Explorer</h1>
        <div class="auth-box">
            <input type="text" id="id" placeholder="Client ID">
            <input type="password" id="secret" placeholder="Client Secret">
        </div>
        <button onclick="run()" style="background:var(--accent); color:white; border:none; padding:15px 35px; border-radius:30px; cursor:pointer; font-weight:900; width:100%;">GENERATE 100 SONGS</button>
        <span id="status">System Ready</span>
    </div>

    <div id="grid"></div>

    <script>
        async function run() {
            const id = document.getElementById('id').value.trim();
            const secret = document.getElementById('secret').value.trim();
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if(!id || !secret) return alert("Credentials required.");
            
            grid.innerHTML = "";
            status.innerText = "Initiating Secure Handshake...";

            try {
                // 1. Get Token
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                
                if(!authRes.ok) throw new Error("Auth Failed - Check Credentials");
                const { access_token } = await authRes.json();

                // 2. Data Fetch Loop
                for (let i = 0; i < 5; i++) {
                    status.innerText = `Syncing Global Stream: ${ (i+1)*20 }/100`;
                    
                    const res = await fetch(`https://api.spotify.com/v1/search?q=top+hits+2026&type=track&limit=20&offset=${i*20}&market=US`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    
                    const data = await res.json();

                    if(data.tracks && data.tracks.items) {
                        data.tracks.items.forEach(track => {
                            // Creating card and forcing it into the grid
                            const card = document.createElement('div');
                            card.className = 'card';
                            
                            const img = track.album?.images[0]?.url || '';
                            const name = track.name || 'Unknown';
                            const artist = track.artists[0]?.name || 'Unknown';
                            const album = track.album.name || 'N/A';
                            const pop = track.popularity || 0;
                            const link = track.external_urls.spotify;

                            card.innerHTML = `
                                <img src="${img}">
                                <div class="card-body">
                                    <div class="song-title">${name}</div>
                                    <div class="artist">${artist}</div>
                                    <div class="meta">
                                        <div class="meta-row"><span>Album</span><span>${album.slice(0,15)}</span></div>
                                        <div class="meta-row"><span>Popularity</span><span>${pop}%</span></div>
                                        <div class="meta-row"><span>Released</span><span>${track.album.release_date}</span></div>
                                    </div>
                                    <a href="${link}" target="_blank" class="btn-play">LISTEN ON SPOTIFY</a>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                }
                status.innerText = "Display Synchronized Successfully.";
            } catch (e) {
                status.innerText = "Critical Error: " + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
