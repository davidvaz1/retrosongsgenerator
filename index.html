<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Explorer - 100 Song Fetch</title>
    <style>
        :root {
            --bg: #121212; --text: #ffffff; --card: #181818; --border: #282828; --accent: #1DB954;
        }
        body.light {
            --bg: #ffffff; --text: #121212; --card: #f4f4f4; --border: #dddddd; --accent: #1aa34a;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; padding: 40px 20px; text-align: center; }
        #grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 30px auto; 
        }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: left; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; aspect-ratio: 1/1; object-fit: cover; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 5px; }
        .toggle-btn { background: #555; font-size: 0.8rem; }
        #status { margin-top: 10px; font-size: 0.9rem; color: var(--accent); }
    </style>
</head>
<body class="dark">

    <button class="toggle-btn" onclick="document.body.classList.toggle('light')">Toggle Light Mode</button>
    <h1>Spotify Explorer</h1>
    <p>Fetching 100 songs (10 pages of 10) to respect Feb 2026 Dev Limits</p>
    
    <button id="main-btn" onclick="generateHundred()">GENERATE 100 SONGS</button>
    <div id="status"></div>
    <div id="grid"></div>

    <script>
        const CLIENT_ID = 'YOUR_CLIENT_ID';
        const CLIENT_SECRET = 'YOUR_CLIENT_SECRET';

        async function getAccessToken() {
            const res = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: {
                    'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'grant_type=client_credentials'
            });
            const data = await res.json();
            return data.access_token;
        }

        async function generateHundred() {
            const btn = document.getElementById('main-btn');
            const grid = document.getElementById('grid');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            grid.innerHTML = "";
            let allTracks = [];

            try {
                const token = await getAccessToken();

                // Loop 10 times to get 100 songs total (10 songs per request)
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Fetching page ${i + 1} of 10...`;
                    
                    const url = new URL('https://api.spotify.com/v1/search');
                    url.searchParams.append('q', 'year:2026');
                    url.searchParams.append('type', 'track');
                    url.searchParams.append('limit', '10'); // Staying under the 10 limit
                    url.searchParams.append('offset', i * 10); // Offset moves by 10 each time

                    const res = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    const data = await res.json();
                    if (data.tracks && data.tracks.items) {
                        allTracks = [...allTracks, ...data.tracks.items];
                        renderTracks(allTracks); // Render incrementally
                    }
                    
                    // Small delay to prevent hitting rate limits during the loop
                    await new Promise(r => setTimeout(r, 100));
                }
                status.innerText = "100 Songs Loaded Successfully.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        function renderTracks(tracks) {
            const grid = document.getElementById('grid');
            grid.innerHTML = tracks.map(t => `
                <div class="card">
                    <img src="${t.album.images[0]?.url || ''}">
                    <div style="font-weight:bold; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${t.name}</div>
                    <div style="color: gray; font-size: 0.75rem;">${t.artists[0].name}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
