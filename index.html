<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Visible Edition</title>
    <style>
        :root {
            --accent: #1DB954;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: #0b1016; color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* BACKGROUND ELEMENTS FOR BLUR DEPTH */
        .blob {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            filter: blur(80px); z-index: -1; opacity: 0.5; animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(0,0); } to { transform: translate(20vw, 20vh); } }

        .header {
            max-width: 600px; margin: 40px auto; text-align: center;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border);
        }

        .auth-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        input { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: white; }

        /* THE GRID - Forced Visibility */
        #grid { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: 40px auto;
            visibility: visible !important; opacity: 1 !important;
        }

        .card { 
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 16px; border: 1px solid var(--border);
            overflow: hidden; display: flex; flex-direction: column;
            height: 100%; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #222; }
        
        .card-body { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .song-title { font-weight: 700; height: 2.8em; overflow: hidden; margin-bottom: 5px; }
        .artist-name { color: var(--accent); font-size: 0.9rem; margin-bottom: 15px; font-weight: 600; }
        
        .meta { font-size: 0.75rem; color: #aaa; margin-bottom: 15px; flex-grow: 1; }
        .meta div { display: flex; justify-content: space-between; margin-bottom: 4px; }

        .play-btn { 
            background: var(--accent); color: white; text-decoration: none; 
            text-align: center; padding: 10px; border-radius: 8px; font-weight: 700;
        }

        #status { font-weight: bold; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="blob" style="background: #7928ca; top: 10%; left: 10%;"></div>
    <div class="blob" style="background: #ff0080; bottom: 10%; right: 10%; animation-delay: -5s;"></div>

    <div class="header">
        <h1>Global 100 Explorer</h1>
        <div class="auth-grid">
            <input type="text" id="clientId" placeholder="Spotify Client ID">
            <input type="password" id="clientSecret" placeholder="Spotify Client Secret">
        </div>
        <button onclick="run()" style="background:var(--accent); color:white; border:none; padding:15px 30px; border-radius:30px; cursor:pointer; font-weight:800;">GENERATE 100 SONGS</button>
        <div id="status">Ready</div>
    </div>

    <div id="grid"></div>

    <script>
        async function run() {
            const id = document.getElementById('clientId').value;
            const secret = document.getElementById('clientSecret').value;
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if(!id || !secret) return alert("Missing credentials");
            
            grid.innerHTML = ""; // Clear grid
            let tracks = [];

            try {
                // 1. Auth
                const auth = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                
                const { access_token } = await auth.json();

                // 2. Fetch Loop
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Syncing Batch ${i+1}/10...`;
                    
                    // We use "top global" search and US market to avoid regional Hindi songs
                    const res = await fetch(`https://api.spotify.com/v1/search?q=top+global+2026&type=track&limit=10&offset=${i*10}&market=US`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    
                    const data = await res.json();
                    if(data.tracks?.items) {
                        tracks = [...tracks, ...data.tracks.items];
                        render(tracks); // Render immediately
                    }
                }
                status.innerText = "100 Tracks Loaded Successfully.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
                console.error(e);
            }
        }

        function render(list) {
            const grid = document.getElementById('grid');
            // Safe mapping to prevent "undefined" errors from stopping the render
            grid.innerHTML = list.map(t => {
                const img = t.album?.images[0]?.url || '';
                const name = t.name || 'Unknown Track';
                const artist = t.artists[0]?.name || 'Unknown Artist';
                const album = t.album?.name || 'Unknown Album';
                const date = t.album?.release_date || 'N/A';
                const pop = t.popularity || 0;
                const link = t.external_urls?.spotify || '#';

                return `
                    <div class="card">
                        <img src="${img}" onerror="this.src='https://via.placeholder.com/300?text=No+Cover'">
                        <div class="card-body">
                            <div class="song-title">${name}</div>
                            <div class="artist-name">${artist}</div>
                            <div class="meta">
                                <div><span>Album</span><span>${album.slice(0,15)}..</span></div>
                                <div><span>Date</span><span>${date}</span></div>
                                <div><span>Popularity</span><span>${pop}%</span></div>
                            </div>
                            <a href="${link}" target="_blank" class="play-btn">LISTEN ON SPOTIFY</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
