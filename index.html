<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Stealth Sync</title>
    <style>
        :root { --accent: #1DB954; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); }
        body { background: #05070a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.3; background: var(--accent); top: -10%; left: -10%; }
        .header { max-width: 500px; margin: 20px auto 40px; text-align: center; background: var(--glass); backdrop-filter: blur(20px); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .auth-grid { display: grid; gap: 8px; margin: 20px 0; }
        input { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.6); color: white; outline: none; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-weight: 800; font-size: 1rem; margin-bottom: 4px; }
        .artist { color: var(--accent); font-weight: 600; font-size: 0.85rem; margin-bottom: 12px; }
        .btn { background: var(--accent); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 10px; font-weight: 800; margin-top: auto; font-size: 0.8rem; }
        #status { color: var(--accent); font-weight: 800; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="orb"></div>
    <div class="header">
        <h2 style="margin:0">Global Explorer</h2>
        <div class="auth-grid">
            <input type="text" id="id" placeholder="Client ID">
            <input type="password" id="secret" placeholder="Client Secret">
        </div>
        <button onclick="run()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:25px; cursor:pointer; font-weight:900;">GENERATE TRACKS</button>
        <p id="status">Standby</p>
    </div>
    <div id="grid"></div>

    <script>
        // Helper to wait between requests
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function run() {
            const id = document.getElementById('id').value.trim();
            const secret = document.getElementById('secret').value.trim();
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if (!id || !secret) return (status.innerText = "Keys required!");

            grid.innerHTML = "";
            const seenIds = new Set();
            const keywords = ['hits', 'pop', 'new', 'vibes', 'top'];

            try {
                status.innerText = "Bypassing filters...";
                // 1. Auth with Cache Buster
                const authRes = await fetch(`https://accounts.spotify.com/api/token?t=${Date.now()}`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });

                if (!authRes.ok) throw new Error("Auth Rejected (Check Keys)");
                const { access_token } = await authRes.json();

                for (let i = 0; i < keywords.length; i++) {
                    status.innerText = `Fetching ${keywords[i]}...`;
                    
                    const query = encodeURIComponent(`${keywords[i]} year:2024-2026`);
                    const res = await fetch(`https://api.spotify.com/v1/search?q=${query}&type=track&limit=20`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });

                    if (res.status === 429) {
                        status.innerText = "Rate limited. Retrying in 2s...";
                        await sleep(2000); // Wait 2 seconds if limited
                        i--; continue; // Try again
                    }

                    const data = await res.json();
                    if (data.tracks?.items) {
                        data.tracks.items.forEach(track => {
                            if (!seenIds.has(track.id)) {
                                seenIds.add(track.id);
                                grid.insertAdjacentHTML('beforeend', `
                                    <div class="card">
                                        <img src="${track.album.images[0]?.url}">
                                        <div class="card-body">
                                            <div class="title">${track.name}</div>
                                            <div class="artist">${track.artists[0].name}</div>
                                            <a href="${track.external_urls.spotify}" target="_blank" class="btn">LISTEN</a>
                                        </div>
                                    </div>
                                `);
                            }
                        });
                    }
                    await sleep(400); // Stagger requests to avoid detection
                }
                status.innerText = `Success: ${seenIds.size} Unique Tracks Found.`;

            } catch (e) {
                status.innerText = e.message;
            }
        }
    </script>
</body>
</html>
