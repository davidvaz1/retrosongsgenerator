<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify 100 - One File Fix</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .auth { background: #181818; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; width: 250px; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1c1c1c; padding: 10px; border-radius: 8px; text-align: left; font-size: 0.8rem; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 4px; aspect-ratio: 1; object-fit: cover; }
        button { background: #1DB954; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #status { color: #1DB954; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth">
        <input type="text" id="id" placeholder="Client ID">
        <input type="password" id="secret" placeholder="Client Secret">
    </div>

    <button id="btn" onclick="go()">GENERATE 100 SONGS</button>
    <div id="status">Ready</div>
    <div id="grid"></div>

    <script>
        async function go() {
            const id = document.getElementById('id').value;
            const secret = document.getElementById('secret').value;
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');

            if(!id || !secret) return alert("Enter keys first!");

            grid.innerHTML = "";
            let tracks = [];

            try {
                // 1. Get Token
                const auth = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await auth.json();

                // 2. Loop 10 times (10 songs per request to avoid "Invalid Limit" 400 error)
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Loading... ${ (i+1) * 10 }%`;
                    
                    const res = await fetch(`https://api.spotify.com/v1/search?q=year:2026&type=track&limit=10&offset=$${i * 10}`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    
                    const data = await res.json();
                    if (data?.tracks?.items) {
                        tracks = [...tracks, ...data.tracks.items];
                        // Render as they come in
                        grid.innerHTML = tracks.map(t => `
                            <div class="card">
                                <img src="${t.album?.images[0]?.url || ''}">
                                <div style="font-weight:bold; margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.name}</div>
                                <div style="color:gray;">${t.artists[0].name}</div>
                            </div>
                        `).join('');
                    }
                }
                status.innerText = "Loaded 100 songs successfully.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
