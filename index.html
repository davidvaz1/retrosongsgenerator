<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Explorer - FIXED VISIBILITY</title>
    <style>
        :root { --bg: #121212; --text: #fff; --card: #181818; --accent: #1DB954; }
        body.light { --bg: #fdfdfd; --text: #121212; --card: #fff; --accent: #1aa34a; }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 40px 20px; transition: 0.3s; }
        
        /* THE CRITICAL FIX: Fixed height and explicit display */
        #grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center;
            gap: 20px; 
            width: 100%;
            min-height: 800px; 
            margin-top: 30px;
            opacity: 1 !important;
            visibility: visible !important;
        }

        .card { 
            background: var(--card); 
            border: 1px solid #333; 
            width: 200px; /* Hard width */
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card img { 
            width: 100%; 
            height: 200px; /* Hard height */
            background: #333; 
            border-radius: 8px; 
            object-fit: cover; 
        }

        button { background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .mode-btn { background: #444; margin-bottom: 20px; font-size: 0.8rem; }
        #status { color: var(--accent); font-weight: bold; margin: 20px; height: 20px; }
    </style>
</head>
<body>

    <button class="mode-btn" onclick="document.body.classList.toggle('light')">Toggle Light Mode</button>
    <h1>Spotify Explorer</h1>
    <button id="btn" onclick="run()">GENERATE 100 SONGS</button>
    <div id="status">Ready</div>
    
    <div id="grid"></div>

    <script>
        const CLIENT_ID = 'YOUR_ID'; 
        const CLIENT_SECRET = 'YOUR_SECRET';

        async function run() {
            const grid = document.getElementById('grid');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            grid.innerHTML = "";
            let tracks = [];

            try {
                // 1. Token
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await authRes.json();

                // 2. Loop 10x
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Fetching ${ (i+1)*10 }%...`;
                    
                    // Fixed URL Construction
                    const url = `https://api.spotify.com/v1/search?q=year:2026&type=track&limit=10&offset=${i * 10}`;
                    
                    const res = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${access_token}` }
                    });
                    const data = await res.json();
                    
                    if (data.tracks?.items) {
                        tracks = [...tracks, ...data.tracks.items];
                        render(tracks); // Immediate Render
                    }
                    await new Promise(r => setTimeout(r, 100));
                }
                status.innerText = "100% Loaded.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(t => `
                <div class="card">
                    <img src="${t.album.images[0]?.url || ''}" onerror="this.src='https://via.placeholder.com/200'">
                    <div style="margin-top:10px; font-weight:bold; font-size:0.8rem;">${t.name}</div>
                    <div style="color:#888; font-size:0.7rem;">${t.artists[0].name}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
