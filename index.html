<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Explorer - FINAL VERIFIED</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #gen-btn { background: #1DB954; color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #gen-btn:disabled { background: #444; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #282828; text-align: left; }
        .card img { width: 100%; border-radius: 4px; display: block; }
        #err { color: #ff5555; background: #2a1111; padding: 15px; border-radius: 5px; margin: 10px auto; max-width: 500px; display: none; border: 1px solid #ff5555; }
    </style>
</head>
<body>

    <h1>Music Explorer</h1>
    <div id="err"></div>
    <button id="gen-btn" onclick="fetchMusic()">GENERATE SONGS</button>
    <div id="grid" class="grid"></div>

    <script>
        // 1. INPUT YOUR REAL KEYS
        const CLIENT_ID = 'fceef14fd21442bcabb8709ca2b824dd';
        const CLIENT_SECRET = 'eafe9c37fbbd49c4a946fe765d6f0f24';

        async function fetchMusic() {
            const btn = document.getElementById('gen-btn');
            const grid = document.getElementById('grid');
            const errBox = document.getElementById('err');

            btn.disabled = true;
            btn.innerText = "WAIT...";
            errBox.style.display = "none";

            try {
                // 2. GET ACCESS TOKEN (Standard Spotify Accounts URL)
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });

                if (!authRes.ok) {
                    const authErr = await authRes.text();
                    throw new Error("Auth Failed: " + authErr);
                }
                const authData = await authRes.json();
                const token = authData.access_token;

                // 3. SEARCH (Standard Spotify API URL)
                const baseUrl = 'https://api.spotify.com/v1/search';
                const params = new URLSearchParams({
                    q: 'year:2025',
                    type: 'track',
                    limit: '50'
                });

                // URLSearchParams handles the '?' and '&' characters automatically
                const searchRes = await fetch(`${baseUrl}?${params.toString()}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (!searchRes.ok) {
                    const errJson = await searchRes.json();
                    throw new Error("Search Error: " + errJson.error.message);
                }

                const data = await searchRes.json();

                // 4. DISPLAY
                if (!data.tracks || data.tracks.items.length === 0) {
                    throw new Error("No tracks found for this query.");
                }

                grid.innerHTML = data.tracks.items.map(t => `
                    <div class="card">
                        <img src="${t.album.images[0]?.url || 'https://via.placeholder.com/200'}" alt="album art">
                        <div style="margin-top:10px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.name}</div>
                        <div style="color:#b3b3b3; font-size:0.8rem;">${t.artists[0].name}</div>
                    </div>
                `).join('');

            } catch (e) {
                errBox.innerText = e.message;
                errBox.style.display = "block";
                console.error("Debug info:", e);
            } finally {
                btn.disabled = false;
                btn.innerText = "GENERATE SONGS";
            }
        }
    </script>
</body>
</html>
