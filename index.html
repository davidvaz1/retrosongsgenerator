<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Force Display</title>
    <style>
        :root { --accent: #1DB954; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #0b0e14; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Floating background for Glassmorphism depth */
        .bg-blur { position: fixed; width: 50vw; height: 50vw; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.3; background: linear-gradient(#1DB954, #7928ca); animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 30%); } }

        .header {
            max-width: 500px; margin: 0 auto 30px; text-align: center;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        .inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }

        /* THE GRID - Forced Layout */
        #grid { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)) !important; 
            gap: 20px !important; 
            width: 100% !important;
            min-height: 500px;
        }

        .card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; display: flex; flex-direction: column;
        }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 10px; object-fit: cover; background: #222; }
        .info { margin-top: 15px; flex-grow: 1; }
        .t { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .a { color: var(--accent); font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .meta { font-size: 0.75rem; color: #aaa; line-height: 1.6; }
        
        .link { 
            display: block; background: var(--accent); color: white; text-align: center; 
            padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px;
        }
        #status { color: var(--accent); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="header">
        <h2>Global 100</h2>
        <div class="inputs">
            <input type="text" id="id" placeholder="Client ID">
            <input type="password" id="secret" placeholder="Client Secret">
        </div>
        <button onclick="run()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:30px; cursor:pointer; font-weight:bold;">GENERATE 100 SONGS</button>
        <div id="status">Ready</div>
    </div>

    <div id="grid"></div>

    <script>
        async function run() {
            const id = document.getElementById('id').value.trim();
            const secret = document.getElementById('secret').value.trim();
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if(!id || !secret) return alert("Keys missing!");
            
            grid.innerHTML = "Attempting to draw cards..."; 
            
            try {
                // 1. Auth
                const auth = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + btoa(id + ':' + secret), 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await auth.json();

                // 2. Fetch with a broader search to ensure data exists
                // market=US filter is still active to avoid regional/Hindi clutter
                for (let i = 0; i < 5; i++) {
                    status.innerText = `Syncing: ${ (i+1)*20 }/100`;
                    
                    const res = await fetch(`https://api.spotify.com/v1/search?q=top%20hits&type=track&limit=20&offset=${i*20}&market=US`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    const data = await res.json();

                    if(data.tracks && data.tracks.items) {
                        if(i === 0) grid.innerHTML = ""; // Clear the "Attempting" text on first batch
                        
                        data.tracks.items.forEach(track => {
                            // DEFENSIVE DATA EXTRACTION
                            const img = track.album?.images?.[0]?.url || '';
                            const name = track.name || 'Unknown';
                            const artist = track.artists?.[0]?.name || 'Unknown';
                            const album = track.album?.name || 'N/A';
                            const date = track.album?.release_date || 'N/A';
                            const pop = track.popularity || 0;
                            const url = track.external_urls?.spotify || '#';

                            // CREATE ELEMENT
                            const div = document.createElement('div');
                            div.className = 'card';
                            div.innerHTML = `
                                <img src="${img}">
                                <div class="info">
                                    <span class="t">${name}</span>
                                    <span class="a">${artist}</span>
                                    <div class="meta">
                                        Album: ${album.slice(0,20)}...<br>
                                        Released: ${date}<br>
                                        Popularity: ${pop}%
                                    </div>
                                    <a href="${url}" target="_blank" class="link">LISTEN</a>
                                </div>
                            `;
                            grid.appendChild(div);
                        });
                    }
                }
                status.innerText = "Display Complete.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
